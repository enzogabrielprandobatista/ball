<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Steel Ball Run — The Great Race</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <canvas id="c" width="800" height="450"></canvas>

  <div id="controls">
    ← → : Mover | ↑ / Z : Pular | ↓ : Cavalo | X : Atacar | C : Especial | P : Pausar | ENTER : Confirmar
  </div>

  <div id="gamepad">
    <div id="dpad">
      <div class="gb-btn" data-key="ArrowUp">▲</div>
      <div class="gb-btn" data-key="ArrowLeft">◄</div>
      <div class="gb-btn" data-key="ArrowDown">▼</div>
      <div class="gb-btn" data-key="ArrowRight">►</div>
    </div>
    <div id="abtns">
      <div class="gb-btn" data-key="KeyZ" title="Pular">Z</div>
      <div class="gb-btn" data-key="KeyX" title="Atacar">X</div>
      <div class="gb-btn" data-key="ArrowDown" title="Cavalo">↓</div>
      <div class="gb-btn" data-key="Enter" title="Confirmar">↵</div>
      <div class="gb-btn" data-key="KeyC" title="Especial">C</div>
      <div class="gb-btn" data-key="KeyP" title="Pausar">P</div>
    </div>
  </div>
  <script>
    'use strict';
    const cv = document.getElementById('c');
    const cx = cv.getContext('2d');
    const W = 800, H = 450, GY = H - 72;

    // ── LOGO IMAGE ────────────────────────────────────────────────────────────────
    const logoImg = new Image();
    logoImg.src = 'GohI0_IXQAAQuej.png';

    // ── GYRO IMAGE ────────────────────────────────────────────────────────────────
    const gyroImg = new Image();
    gyroImg.src = 'gyro.png';

    // ── STAGE 3 BG IMAGE ─────────────────────────────────────────────────────────
    const stage3Bg = new Image();
    stage3Bg.src = 'download.jfif';

    // ── INPUT ──────────────────────────────────────────────────────────────────
    const keys = {}, jp = {};
    window.addEventListener('keydown', e => {
      if (!keys[e.code]) jp[e.code] = true;
      keys[e.code] = true;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });
    function clearJP() { for (const k in jp) delete jp[k]; }

    // ── UTILS ──────────────────────────────────────────────────────────────────
    const rand = (a, b) => Math.random() * (b - a) + a;
    const rInt = (a, b) => Math.floor(rand(a, b + 1));
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    function hit(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }
    function toHex(n) { return Math.floor(clamp(n, 0, 255)).toString(16).padStart(2, '0'); }

    // ── GAME STATES ────────────────────────────────────────────────────────────
    const GS = { MENU: 0, SELECT: 1, PLAYING: 2, BOSS_INTRO: 3, BOSS: 4, STAGE_CLEAR: 5, GAMEOVER: 6, WIN: 7 };
    let gs = GS.MENU;
    let paused = false;

    // ── STAGES ─────────────────────────────────────────────────────────────────
    const STAGES = [
      { name: 'Etapa 1 — Deserto do Mojave', sky: '#E8A040', gnd: '#B86A10', dust: '#D4884A', bossName: 'Mountain Tim', bossColor: '#8B4513', len: 5500 },
      { name: 'Etapa 2 — Rocky Mountains', sky: '#5A8AB0', gnd: '#3A5060', dust: '#708090', bossName: 'Ringo Roadagain', bossColor: '#2F4F4F', len: 7000 },
      { name: 'Etapa 3 — Palma do Diabo', sky: '#80C048', gnd: '#487828', dust: '#70A038', bossName: 'Sandman', bossColor: '#DEB887', len: 8500 },
    ];

    // ── GLOBALS ────────────────────────────────────────────────────────────────
    let frame = 0, score = 0, selectedChar = 0, currentStage = 0;
    let player, enemies, pProjs, eProjs, bProjs, particles, boss;
    let camX, raceProgress, stageLen, spawnCd, bossTriggered;
    let bossIntroTimer, stageClearTimer, bgEls;


    // ── PLAYER ─────────────────────────────────────────────────────────────────
    function mkPlayer(ci) {
      return {
        x: 120, y: GY - 72, w: 46, h: 72,
        vx: 0, vy: 0, onGnd: true,
        hp: 300, maxHp: 300,
        facing: 1,
        atkCd: 0, invT: 0,
        ci,                  // 0=Johnny, 1=Gyro
        special: 100, maxSp: 100, spCd: 0,
        tuskAct: 1, spinLv: 1,
        dinoLv: 1, dinoForm: false, dinoTimer: 0,
        onHorse: true,
        tuskTimer: 0,         // frames que o Tusk fica visível no ombro
      };
    }

    // ── PROJECTILE FACTORIES ───────────────────────────────────────────────────
    function fireNail(x, y, dir, act) {
      pProjs.push({
        x, y, w: act >= 3 ? 14 : 9, h: 6,
        vx: (act >= 3 ? 15 : 10) * dir, vy: 0,
        dmg: 14 * act, type: 'nail', act,
        life: 100, bounces: act === 3 ? 2 : 0,
        rot: 0
      });
    }
    function fireBall(x, y, dir, lv, homing = false) {
      pProjs.push({
        x, y, w: 14, h: 14,
        vx: 11 * dir, vy: -3,
        dmg: 22 * lv, type: 'ball',
        life: 130, bounces: 3,
        rot: 0, homing
      });
    }
    function fireKnife(x, y, dir, lv) {
      pProjs.push({ x, y, w: 16, h: 5, vx: 16 * dir, vy: -1, dmg: 18 * lv, type: 'knife', life: 80, bounces: 0, rot: 0 });
    }
    function fireClaw(x, y, dir, lv) {
      pProjs.push({ x, y, w: 38, h: 40, vx: 0, vy: 0, dmg: 40 * lv, type: 'claw', life: 7, bounces: 0, rot: 0 });
    }
    function fireBullet(x, y, dir, lv, dino = false) {
      pProjs.push({ x, y, w: 12, h: 6, vx: 20 * dir, vy: 0, dmg: 16 * lv, type: 'bullet', life: 70, bounces: 0, rot: 0, noGravity: true, dino });
    }

    function enemyShoot(ex, ey, px, py, dmg = 10, spd = 8) {
      const dx = px - ex, dy = py - ey, d = Math.hypot(dx, dy) || 1;
      eProjs.push({ x: ex, y: ey, w: 9, h: 9, vx: dx / d * spd, vy: dy / d * spd, dmg, life: 120 });
    }
    function bossShoot(bx, by, px, py, dmg, spd, spread = 0) {
      const dx = px - bx, dy = py - by, d = Math.hypot(dx, dy) || 1;
      bProjs.push({ x: bx, y: by, w: 11, h: 11, vx: dx / d * spd + spread, vy: dy / d * spd, dmg, life: 150 });
    }

    // ── BACKGROUND ELEMENTS ────────────────────────────────────────────────────
    function mkBgEls(si, len) {
      const els = [];
      for (let i = 0; i < 35; i++) {
        els.push({ x: rand(200, len), y: GY - 2, type: ['cactus', 'rock', 'bush'][si], sz: rand(14, 38) });
      }
      for (let i = 0; i < 12; i++) {
        els.push({ x: rand(0, len), y: rand(25, 100), type: 'cloud', sz: rand(40, 75), spd: rand(0.08, 0.25) });
      }
      return els;
    }

    // ── INIT STAGE ─────────────────────────────────────────────────────────────
    function initStage(si) {
      enemies = []; pProjs = []; eProjs = []; bProjs = []; particles = []; boss = null;
      bossTriggered = false; bossIntroTimer = 0; stageClearTimer = 0;
      camX = 0; raceProgress = 0;
      stageLen = STAGES[si].len;
      spawnCd = 90;
      player.x = 120; player.y = GY - player.h;
      player.vx = 0; player.vy = 0; player.onGnd = true; player.invT = 0;
      bgEls = mkBgEls(si, stageLen);
    }

    // ── SPAWN ENEMY ────────────────────────────────────────────────────────────
    function spawnEnemy() {
      const type = Math.random() < 0.55 ? 'rider' : 'gunman';
      enemies.push({
        x: camX + W + rInt(60, 200), y: GY - 55, w: 34, h: 55,
        vx: -rand(1.8, 3.5), vy: 0, onGnd: true,
        hp: type === 'rider' ? 45 : 32, maxHp: type === 'rider' ? 45 : 32,
        type, atkCd: rInt(70, 140), facing: -1, dead: false, fromRight: true,
      });
    }

    // ── BOSS FACTORY ───────────────────────────────────────────────────────────
    function mkBoss(si) {
      const s = STAGES[si];
      return {
        x: camX + W - 100, y: GY - 72, w: 48, h: 72,
        vx: 2, vy: 0, onGnd: true,
        hp: 480 + si * 120, maxHp: 480 + si * 120,
        name: s.bossName, color: s.bossColor,
        facing: -1, phase: 1,
        atkCd: 100, movCd: 90, movDir: -1,
        dead: false,
      };
    }

    // ── PARTICLES ──────────────────────────────────────────────────────────────
    function spark(x, y, col, n, big = false) {
      for (let i = 0; i < n; i++) {
        const a = rand(0, Math.PI * 2), sp = rand(1, big ? 7 : 3.5);
        particles.push({
          x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - (big ? 2 : 0),
          life: rInt(18, big ? 55 : 32), col, sz: rand(2, big ? 7 : 4.5)
        });
      }
    }

    // ── UPDATE FUNCTIONS ───────────────────────────────────────────────────────
    function updPlayer() {
      const p = player;
      if (p.atkCd > 0) p.atkCd--;
      if (p.invT > 0) p.invT--;
      if (p.spCd > 0) p.spCd--;
      if (p.tuskTimer > 0) p.tuskTimer--;
      if (p.ci === 2 && p.dinoForm) {
        p.dinoTimer--;
        if (p.dinoTimer <= 0) { p.dinoForm = false; }
      }

      // Montar / Desmontar cavalo (↓)
      if (jp['ArrowDown'] && p.onGnd && !(p.ci === 2 && p.dinoForm)) {
        p.onHorse = !p.onHorse;
        p.h = 72;
      }
      // Força desmontar se virar scary monster montado
      if (p.ci === 2 && p.dinoForm && p.onHorse) {
        p.onHorse = false;
        p.h = 72;
      }

      // Auto-advance (cavalo avança mais rápido; dino também)
      const horseMult = p.onHorse ? 1 : 0;
      const dinoSpd = (p.ci === 2 && p.dinoForm) ? 1.8 : 0;
      let autoVX = gs === GS.BOSS ? 0 : (1.2 + horseMult * 1.4 + dinoSpd * 0.6);

      const runSpd = p.onHorse ? 7 : (p.ci === 2 && p.dinoForm ? 7.5 : 4.5);
      const backSpd = p.onHorse ? -4.5 : (p.ci === 2 && p.dinoForm ? -5 : -2.8);
      if (keys['ArrowLeft'] || keys['KeyA']) { p.vx = backSpd; p.facing = -1; }
      else if (keys['ArrowRight'] || keys['KeyD']) { p.vx = runSpd + autoVX; p.facing = 1; }
      else p.vx = autoVX;

      // Jump
      if ((jp['ArrowUp'] || jp['KeyW'] || jp['KeyZ']) && p.onGnd) {
        p.vy = p.onHorse ? -17 : (p.ci === 2 && p.dinoForm ? -18 : -13);
        p.onGnd = false;
      }

      // Attack X
      if (jp['KeyX'] && p.atkCd <= 0) {
        const mx = p.x + (p.facing > 0 ? p.w : 0);
        if (p.ci === 0) fireNail(mx, p.y + 22, 1, p.tuskAct);
        else if (p.ci === 1) fireBall(mx, p.y + 18, p.facing, p.spinLv);
        else if (p.ci === 2) {
          if (p.dinoForm) {
            const cx2 = p.facing > 0 ? p.x + p.w - 4 : p.x - 34;
            fireClaw(cx2, p.y + 14, p.facing, p.dinoLv);
            fireBullet(mx, p.y + 20, p.facing, p.dinoLv, true);
            spark(cx2 + 19, p.y + 34, '#22FF44', 8);
          } else {
            fireBullet(mx, p.y + 24, p.facing, p.dinoLv, false);
          }
        }
        p.atkCd = p.ci === 0 ? 18 : p.ci === 1 ? 32 : (p.dinoForm ? 20 : 14);
      }

      // Special C
      if (jp['KeyC'] && p.spCd <= 0 && p.special >= 50) {
        const mx = p.x + (p.facing > 0 ? p.w : 0);
        if (p.ci === 0) {
          const act = p.tuskAct;
          if (act === 1) {
            // ACT 1 — 1 prego rápido direto
            fireNail(mx, p.y + 22, 1, 1);
            pProjs[pProjs.length - 1].vx *= 1.8;
          } else if (act === 2) {
            // ACT 2 — espiral: 3 pregos em leque
            for (let i = -1; i <= 1; i++) {
              fireNail(mx, p.y + 22, 1, 2);
              pProjs[pProjs.length - 1].vy = i * 5;
            }
          } else if (act === 3) {
            // ACT 3 — ricochete em X: 4 pregos em diagonais
            const dirs = [{ vx: p.facing * 12, vy: -5 }, { vx: p.facing * 12, vy: 5 }, { vx: p.facing * 10, vy: -2 }, { vx: p.facing * 10, vy: 2 }];
            dirs.forEach(d => {
              fireNail(mx, p.y + 22, 1, 3);
              pProjs[pProjs.length - 1].vx = d.vx;
              pProjs[pProjs.length - 1].vy = d.vy;
            });
          } else {
            // ACT 4 — Infinite Rotation: 8 pregos em todas as direções
            for (let i = 0; i < 8; i++) {
              const angle = (Math.PI * 2 / 8) * i;
              fireNail(p.x + p.w / 2, p.y + p.h / 2, 1, 4);
              pProjs[pProjs.length - 1].vx = Math.cos(angle) * 14;
              pProjs[pProjs.length - 1].vy = Math.sin(angle) * 14;
              pProjs[pProjs.length - 1].bounces = 3;
            }
            spark(p.x + p.w / 2, p.y + p.h / 2, '#00CFFF', 20, true);
          }
        } else if (p.ci === 1) {
          for (let i = -1; i <= 1; i++) fireBall(mx, p.y + 18, p.facing, p.spinLv + 1, true);
        } else if (p.ci === 2) {
          p.dinoForm = true;
          p.dinoTimer = 3600 * p.dinoLv;
          spark(p.x + p.w / 2, p.y + p.h / 2, '#22FF44', 22, true);
        }
        p.special -= 50; p.spCd = 110;
        if (p.ci === 0) p.tuskTimer = 1200;
      }

      p.vy = Math.min(p.vy + 0.7, 18);
      p.x += p.vx; p.y += p.vy;

      if (p.y >= GY - p.h) { p.y = GY - p.h; p.vy = 0; p.onGnd = true; }
      p.x = clamp(p.x, camX + 10, camX + W - p.w - 10);

      if (p.special < p.maxSp) p.special = Math.min(p.maxSp, p.special + 0.08);
    }

    function updEnemies() {
      enemies = enemies.filter(e => !e.dead);
      const p = player;
      enemies.forEach(e => {
        // Sempre vem da direita em direção ao jogador
        const dx = p.x - e.x;
        e.vx = -rand(1.8, 3.2); // sempre para a esquerda
        e.facing = -1;
        e.vy = Math.min(e.vy + 0.7, 18);
        e.x += e.vx; e.y += e.vy;
        if (e.y >= GY - e.h) { e.y = GY - e.h; e.vy = 0; e.onGnd = true; }

        // Attack
        e.atkCd--;
        if (e.atkCd <= 0 && Math.abs(dx) < 380) {
          enemyShoot(e.x + e.w / 2, e.y + 25, p.x + p.w / 2, p.y + p.h / 2);
          e.atkCd = rInt(75, 150);
        }

        // Remove quando passa pelo jogador e sai pela esquerda
        if (e.x < camX - 100) e.dead = true;

        // Hit by player projectiles
        pProjs.forEach(pp => {
          if (!pp.gone && hit(pp, { x: e.x, y: e.y, w: e.w, h: e.h })) {
            e.hp -= pp.dmg; spark(pp.x, pp.y, '#FF4400', 5);
            if (pp.type !== 'ball' || pp.bounces <= 0) pp.gone = true; else pp.bounces--;
            score += 12;
          }
        });

        if (e.hp <= 0) { e.dead = true; spark(e.x + e.w / 2, e.y + e.h / 2, '#FF6B00', 14, true); score += 55; }
      });

      // Enemy projs vs player
      if (p.invT <= 0) {
        eProjs.forEach(pp => {
          if (hit(pp, { x: p.x, y: p.y, w: p.w, h: p.h })) {
            p.hp -= pp.dmg; p.invT = 55; pp.life = 0;
            spark(p.x + p.w / 2, p.y, '#FF0000', 7);
          }
        });
      }
      eProjs.forEach(pp => { pp.x += pp.vx; pp.y += pp.vy; pp.life--; });
      eProjs = eProjs.filter(pp => pp.life > 0);
    }

    function updPProjs() {
      pProjs.forEach(pp => {
        pp.x += pp.vx; if (!pp.noGravity) pp.vy += 0.18; pp.y += pp.vy; pp.life--;
        if (pp.rot !== undefined) pp.rot += 0.35;
        if (pp.y >= GY - 4 && pp.bounces > 0) {
          pp.vy = -Math.abs(pp.vy) * 0.65; pp.bounces--; pp.y = GY - 4;
        }
        if (pp.homing && enemies.length > 0) {
          const cl = enemies.reduce((a, b) => Math.hypot(b.x - pp.x, b.y - pp.y) < Math.hypot(a.x - pp.x, a.y - pp.y) ? b : a);
          const d = Math.hypot(cl.x - pp.x, cl.y - pp.y) || 1;
          pp.vx += (cl.x - pp.x) / d * 0.55; pp.vy += (cl.y - pp.y) / d * 0.55;
        }
      });
      pProjs = pProjs.filter(pp => pp.life > 0 && !pp.gone);
    }

    function updBoss() {
      const b = boss, p = player;
      b.vy = Math.min(b.vy + 0.7, 18);
      b.movCd--;
      if (b.movCd <= 0) {
        b.movDir *= -1;
        b.movCd = rInt(55, 105);
        if (b.onGnd && Math.random() < 0.3) { b.vy = -14; b.onGnd = false; }
      }
      b.x += b.vx * b.movDir; b.y += b.vy;
      if (b.y >= GY - b.h) { b.y = GY - b.h; b.vy = 0; b.onGnd = true; }
      b.x = clamp(b.x, camX + 30, camX + W - b.w - 30);
      b.facing = p.x > b.x ? 1 : -1;

      // Phase 2
      if (b.hp < b.maxHp / 2 && b.phase === 1) {
        b.phase = 2; b.vx *= 1.6; spark(b.x + b.w / 2, b.y + b.h / 2, '#FF0000', 25, true);
      }

      // Boss attacks
      b.atkCd--;
      if (b.atkCd <= 0) {
        const atk = b.phase === 2 ? rInt(0, 3) : rInt(0, 2);
        const bx = b.x + b.w / 2, by = b.y + 35, px = p.x + p.w / 2, py = p.y + p.h / 2;
        const spd = b.phase === 2 ? 11 : 8;
        if (atk === 0) bossShoot(bx, by, px, py, 14, spd);
        else if (atk === 1) { bossShoot(bx, by, px, py, 11, spd, -4); bossShoot(bx, by, px, py, 11, spd, 0); bossShoot(bx, by, px, py, 11, spd, 4); }
        else if (atk === 2) { for (let i = 0; i < 5; i++) bossShoot(bx, by, px, py, 9, spd + rInt(-2, 2)); }
        else { if (b.onGnd) { b.vy = -16; b.onGnd = false; } b.movDir = p.x > b.x ? 1 : -1; b.movCd = 20; }
        b.atkCd = b.phase === 2 ? rInt(45, 75) : rInt(70, 110);
      }

      // Boss projs update
      bProjs.forEach(pp => { pp.x += pp.vx; pp.y += pp.vy; pp.life--; });
      bProjs = bProjs.filter(pp => pp.life > 0);

      // Boss projs vs player
      if (p.invT <= 0) {
        bProjs.forEach(pp => {
          if (hit(pp, { x: p.x, y: p.y, w: p.w, h: p.h })) {
            p.hp -= pp.dmg; p.invT = 65; pp.life = 0;
            spark(p.x + p.w / 2, p.y, '#FF0000', 9);
          }
        });
      }

      // Player projs vs boss
      pProjs.forEach(pp => {
        if (!pp.gone && hit(pp, { x: b.x, y: b.y, w: b.w, h: b.h })) {
          b.hp -= pp.dmg; spark(pp.x, pp.y, '#FFD700', 7);
          if (pp.type !== 'ball' || pp.bounces <= 0) pp.gone = true; else pp.bounces--;
          score += 28;
        }
      });

      // Contact damage
      if (p.invT <= 0 && hit(p, { x: b.x, y: b.y, w: b.w, h: b.h })) {
        p.hp -= 18; p.invT = 80; spark(p.x + p.w / 2, p.y, '#FF0000', 10);
      }

      // Boss death
      if (b.hp <= 0) {
        spark(b.x + b.w / 2, b.y + b.h / 2, '#FFD700', 35, true);
        boss = null; score += 600;
        gs = GS.STAGE_CLEAR; stageClearTimer = 200;
      }
    }

    function updParticles() {
      particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--; });
      particles = particles.filter(p => p.life > 0);
    }

    // ── DRAW FUNCTIONS ─────────────────────────────────────────────────────────
    function drawBg(si) {
      const s = STAGES[si];

      if (si === 2 && stage3Bg.complete && stage3Bg.naturalWidth > 0) {
        cx.drawImage(stage3Bg, 0, 0, W, H);
        // chão — base areia
        cx.fillStyle = '#C8A060'; cx.fillRect(0, GY, W, H - GY);
        // gradiente de profundidade
        const sandGr = cx.createLinearGradient(0, GY, 0, H);
        sandGr.addColorStop(0, '#D4B070');
        sandGr.addColorStop(1, '#A07840');
        cx.fillStyle = sandGr; cx.fillRect(0, GY, W, H - GY);
        // ondulações de areia (linhas horizontais)
        for (let row = 0; row < 6; row++) {
          const ry = GY + 6 + row * 7;
          cx.strokeStyle = `rgba(255,220,140,${0.18 - row * 0.02})`;
          cx.lineWidth = 1.5;
          cx.beginPath();
          for (let x = 0; x < W; x += 8) {
            const wave = Math.sin((x + camX * 0.4 + row * 31) * 0.04) * 2;
            x === 0 ? cx.moveTo(x, ry + wave) : cx.lineTo(x, ry + wave);
          }
          cx.stroke();
        }
        // grãozinhos de areia (pontos aleatórios seeded por camX)
        cx.fillStyle = 'rgba(200,160,80,0.35)';
        for (let i = 0; i < 60; i++) {
          const gx = ((i * 137 + Math.floor(camX * 0.1) * 71) % W);
          const gy2 = GY + 2 + (i * 53) % (H - GY - 4);
          cx.fillRect(gx, gy2, 2, 1);
        }
        // borda superior da areia
        cx.fillStyle = '#E8C880'; cx.fillRect(0, GY, W, 3);
      } else {
        const gr = cx.createLinearGradient(0, 0, 0, GY);
        gr.addColorStop(0, s.sky); gr.addColorStop(1, s.dust);
        cx.fillStyle = gr; cx.fillRect(0, 0, W, GY);
        cx.fillStyle = s.gnd; cx.fillRect(0, GY, W, H - GY);
        cx.fillStyle = 'rgba(255,255,255,0.15)'; cx.fillRect(0, GY, W, 3);
      }

      // Clouds
      bgEls.filter(e => e.type === 'cloud').forEach(e => {
        const sx = e.x - camX;
        if (sx < -100 || sx > W + 100) return;
        cx.fillStyle = 'rgba(255,255,255,0.72)';
        cx.beginPath(); cx.ellipse(sx, e.y, e.sz, e.sz * 0.42, 0, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.ellipse(sx - e.sz * 0.38, e.y + 4, e.sz * 0.58, e.sz * 0.35, 0, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.ellipse(sx + e.sz * 0.38, e.y + 5, e.sz * 0.65, e.sz * 0.36, 0, 0, Math.PI * 2); cx.fill();
      });

      // Scenery
      bgEls.filter(e => e.type !== 'cloud').forEach(e => {
        const sx = e.x - camX;
        if (sx < -80 || sx > W + 80) return;
        const t = e.type;
        if (t === 'cactus') {
          cx.fillStyle = '#4A8A18'; cx.fillRect(sx - 4, GY - e.sz, 8, e.sz);
          cx.fillRect(sx - 16, GY - e.sz * 0.6, 12, 7); cx.fillRect(sx + 8, GY - e.sz * 0.5, 12, 7);
        } else if (t === 'rock') {
          cx.fillStyle = '#787878';
          cx.beginPath(); cx.ellipse(sx, GY - e.sz * 0.28, e.sz * 0.65, e.sz * 0.36, 0, 0, Math.PI * 2); cx.fill();
          cx.fillStyle = '#9A9A9A';
          cx.beginPath(); cx.ellipse(sx - 4, GY - e.sz * 0.3, e.sz * 0.3, e.sz * 0.2, 0, 0, Math.PI * 2); cx.fill();
        } else {
          cx.fillStyle = '#3A7A18';
          cx.beginPath(); cx.arc(sx, GY - e.sz * 0.28, e.sz * 0.46, 0, Math.PI * 2); cx.fill();
          cx.fillStyle = '#4A9A20';
          cx.beginPath(); cx.arc(sx - e.sz * 0.3, GY - e.sz * 0.22, e.sz * 0.32, 0, Math.PI * 2); cx.fill();
        }
      });
    }

    function drawHorse(sx, y, f, gallop, white=false) {
      const t = frame * 0.28;
      const bob = Math.sin(t) * (gallop ? 3 : 1);
      const lp = gallop
        ? [Math.sin(t)*10, Math.sin(t+Math.PI)*10, Math.sin(t+0.9)*10, Math.sin(t+Math.PI+0.9)*10]
        : [bob*0.4, -bob*0.4, bob*0.4, -bob*0.4];

      const B  = white ? '#E8E8E8' : '#7A4E2E';
      const BD = white ? '#B8B8B8' : '#4E2E10';
      const BL = white ? '#F4F4F4' : '#9E6E46';
      const BH = white ? '#FFFFFF' : '#C08C60';
      const MN = white ? '#888888' : '#120800';

      // Sombra chão
      cx.fillStyle='rgba(0,0,0,0.22)';
      cx.beginPath(); cx.ellipse(sx+32,y+67,34,5,0,0,Math.PI*2); cx.fill();

      // ── CAUDA ───────────────────────────────────────────────────────────
      const tailX = f>0 ? sx+4 : sx+56;
      cx.fillStyle=MN;
      cx.beginPath();
      cx.moveTo(tailX,            y+28+bob);
      cx.bezierCurveTo(tailX+(f>0?-16:16), y+40+bob, tailX+(f>0?-20:20), y+58, tailX+(f>0?-12:12), y+66);
      cx.lineTo(tailX+(f>0?-5:5), y+66);
      cx.bezierCurveTo(tailX+(f>0?-13:13), y+56, tailX+(f>0?-9:9), y+38+bob, tailX+(f>0?7:-7), y+28+bob);
      cx.closePath(); cx.fill();

      // ── PERNAS TRASEIRAS ────────────────────────────────────────────────
      // par traseiro — perna de trás (mais escura)
      const rl0x = sx+(f>0?8:42);
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(rl0x,   y+36+bob+lp[3]*0.5, 13, 30, [0,0,4,4]); cx.fill();
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(rl0x+1, y+35+bob+lp[3]*0.5, 11, 28, [0,0,4,4]); cx.fill();
      cx.fillStyle=BD; cx.fillRect(rl0x, y+62, 13, 4); // casco

      // par traseiro — perna da frente
      const rl1x = sx+(f>0?20:30);
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(rl1x,   y+36+bob+lp[2]*0.5, 13, 30, [0,0,4,4]); cx.fill();
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(rl1x+1, y+35+bob+lp[2]*0.5, 11, 28, [0,0,4,4]); cx.fill();
      cx.fillStyle=BL; cx.fillRect(rl1x+2, y+36+bob+lp[2]*0.5, 4, 14);
      cx.fillStyle=BD; cx.fillRect(rl1x, y+62+lp[2]*0.5, 13, 4);

      // ── CORPO ARREDONDADO ───────────────────────────────────────────────
      // sombra
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(sx+3, y+20+bob, 55, 24, 10); cx.fill();
      // corpo base
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(sx+1, y+18+bob, 55, 22, 10); cx.fill();
      // face topo (brilho)
      cx.fillStyle=BL;
      cx.beginPath(); cx.roundRect(sx+4, y+18+bob, 48, 10, [10,10,0,0]); cx.fill();
      // highlight
      cx.fillStyle=BH;
      cx.beginPath(); cx.roundRect(sx+10, y+19+bob, 34, 5, 5); cx.fill();

      // ── PERNAS DIANTEIRAS ───────────────────────────────────────────────
      const fl0x = sx+(f>0?38:8);
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(fl0x,   y+36+bob+lp[0]*0.5, 13, 30, [0,0,4,4]); cx.fill();
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(fl0x+1, y+35+bob+lp[0]*0.5, 11, 28, [0,0,4,4]); cx.fill();
      cx.fillStyle=BD; cx.fillRect(fl0x, y+62+lp[0]*0.5, 13, 4);

      const fl1x = sx+(f>0?50:20);
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(fl1x,   y+36+bob+lp[1], 13, 30, [0,0,4,4]); cx.fill();
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(fl1x+1, y+35+bob+lp[1], 11, 28, [0,0,4,4]); cx.fill();
      cx.fillStyle=BL; cx.fillRect(fl1x+2, y+36+bob+lp[1], 4, 14);
      cx.fillStyle=BD; cx.fillRect(fl1x, y+62+lp[1], 13, 4);

      // ── PESCOÇO ARREDONDADO ─────────────────────────────────────────────
      const nkBx = f>0 ? sx+47 : sx+10;
      const nkTx = f>0 ? sx+58 : sx-2;
      // sombra pescoço
      cx.fillStyle=BD;
      cx.beginPath();
      cx.moveTo(nkBx,    y+38+bob);
      cx.bezierCurveTo(nkBx+(f>0?2:-2), y+22+bob, nkTx+(f>0?4:-4), y+8+bob, nkTx+10, y+2+bob);
      cx.lineTo(nkTx+22, y+10+bob);
      cx.bezierCurveTo(nkTx+(f>0?20:-20)+22, y+22+bob, nkBx+16+(f>0?0:0), y+36+bob, nkBx+16, y+38+bob);
      cx.closePath(); cx.fill();
      // pescoço principal
      cx.fillStyle=B;
      cx.beginPath();
      cx.moveTo(nkBx+2,  y+36+bob);
      cx.bezierCurveTo(nkBx+(f>0?3:-3)+2, y+20+bob, nkTx+(f>0?3:-3)+2, y+7+bob, nkTx+11, y+1+bob);
      cx.lineTo(nkTx+21, y+9+bob);
      cx.bezierCurveTo(nkTx+(f>0?18:-18)+21, y+20+bob, nkBx+14, y+34+bob, nkBx+14, y+36+bob);
      cx.closePath(); cx.fill();
      // brilho pescoço
      cx.fillStyle=BL;
      cx.beginPath();
      cx.moveTo(nkBx+5,  y+34+bob);
      cx.bezierCurveTo(nkBx+6, y+20+bob, nkTx+5, y+8+bob, nkTx+13, y+2+bob);
      cx.lineTo(nkTx+17, y+6+bob);
      cx.bezierCurveTo(nkTx+10, y+16+bob, nkBx+10, y+30+bob, nkBx+10, y+34+bob);
      cx.closePath(); cx.fill();

      // ── CRINA ───────────────────────────────────────────────────────────
      cx.fillStyle=MN;
      cx.beginPath();
      cx.moveTo(nkBx+4,  y+34+bob);
      cx.bezierCurveTo(nkBx+5, y+18+bob, nkTx+4, y+6+bob, nkTx+12, y+0+bob);
      cx.lineTo(nkTx+16, y+4+bob);
      cx.bezierCurveTo(nkTx+8, y+10+bob, nkBx+2, y+20+bob, nkBx+2, y+34+bob);
      cx.closePath(); cx.fill();

      // ── CABEÇA ──────────────────────────────────────────────────────────
      const hbx = f>0 ? sx+62 : sx-18;
      const hby = y-2+bob;
      // sombra cabeça
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(hbx+(f>0?2:-2), hby+1, 22, 18, 7); cx.fill();
      // cabeça principal
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(hbx, hby, 22, 18, 7); cx.fill();
      // brilho cabeça
      cx.fillStyle=BL;
      cx.beginPath(); cx.roundRect(hbx+(f>0?2:2), hby+1, 14, 7, [7,4,0,4]); cx.fill();

      // Focinho arredondado
      cx.fillStyle=BD;
      cx.beginPath(); cx.roundRect(hbx+(f>0?11:-5)+(f>0?1:-1), hby+11, 16, 10, 5); cx.fill();
      cx.fillStyle=B;
      cx.beginPath(); cx.roundRect(hbx+(f>0?11:-5), hby+10, 16, 10, 5); cx.fill();
      cx.fillStyle=BL;
      cx.beginPath(); cx.roundRect(hbx+(f>0?12:-4), hby+10, 12, 5, [5,5,0,0]); cx.fill();
      // Narinas
      cx.fillStyle='#1A0808';
      cx.beginPath(); cx.ellipse(hbx+(f>0?23:3),  hby+17, 2, 1.5, 0, 0, Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(hbx+(f>0?17:9),  hby+17, 2, 1.5, 0, 0, Math.PI*2); cx.fill();

      // Orelha de trás — larga na base, arredondada, levemente inclinada
      cx.fillStyle=BD;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?13:4),  hby+1);
      cx.quadraticCurveTo(hbx+(f>0?14:3),  hby-9,  hbx+(f>0?18:7),  hby-9);
      cx.quadraticCurveTo(hbx+(f>0?22:11), hby-9,  hbx+(f>0?21:10), hby+1);
      cx.closePath(); cx.fill();
      cx.fillStyle=B;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?14:5),  hby+1);
      cx.quadraticCurveTo(hbx+(f>0?14:4),  hby-8,  hbx+(f>0?18:8),  hby-8);
      cx.quadraticCurveTo(hbx+(f>0?21:12), hby-8,  hbx+(f>0?20:11), hby+1);
      cx.closePath(); cx.fill();
      cx.fillStyle=MN;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?16:6),  hby);
      cx.quadraticCurveTo(hbx+(f>0?16:6),  hby-6,  hbx+(f>0?18:8),  hby-6);
      cx.quadraticCurveTo(hbx+(f>0?20:10), hby-6,  hbx+(f>0?19:9),  hby);
      cx.closePath(); cx.fill();

      // Orelha da frente — igual mas ligeiramente maior e mais à frente
      cx.fillStyle=BD;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?3:14),  hby+1);
      cx.quadraticCurveTo(hbx+(f>0?3:13),  hby-10, hbx+(f>0?8:18),  hby-10);
      cx.quadraticCurveTo(hbx+(f>0?12:22), hby-10, hbx+(f>0?12:21), hby+1);
      cx.closePath(); cx.fill();
      cx.fillStyle=B;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?4:15),  hby+1);
      cx.quadraticCurveTo(hbx+(f>0?3:14),  hby-9,  hbx+(f>0?8:18),  hby-9);
      cx.quadraticCurveTo(hbx+(f>0?12:22), hby-9,  hbx+(f>0?11:20), hby+1);
      cx.closePath(); cx.fill();
      cx.fillStyle=BL;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?5:16),  hby);
      cx.quadraticCurveTo(hbx+(f>0?5:15),  hby-6,  hbx+(f>0?8:18),  hby-6);
      cx.quadraticCurveTo(hbx+(f>0?10:20), hby-6,  hbx+(f>0?9:19),  hby);
      cx.closePath(); cx.fill();
      cx.fillStyle=MN;
      cx.beginPath();
      cx.moveTo(hbx+(f>0?6:15),  hby);
      cx.quadraticCurveTo(hbx+(f>0?6:15),  hby-5,  hbx+(f>0?8:17),  hby-5);
      cx.quadraticCurveTo(hbx+(f>0?10:19), hby-5,  hbx+(f>0?9:18),  hby);
      cx.closePath(); cx.fill();

      // Olho frente — tamanho normal
      cx.fillStyle='#100600';
      cx.beginPath(); cx.arc(hbx+(f>0?7:15), hby+7, 3, 0, Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.6)';
      cx.beginPath(); cx.arc(hbx+(f>0?8:16), hby+6, 1.2, 0, Math.PI*2); cx.fill();
      // Olho de trás — mesmo tamanho
      cx.fillStyle='#100600';
      cx.beginPath(); cx.arc(hbx+(f>0?15:7), hby+7, 3, 0, Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.4)';
      cx.beginPath(); cx.arc(hbx+(f>0?16:8), hby+6, 1.2, 0, Math.PI*2); cx.fill();

      // ── SELA ────────────────────────────────────────────────────────────
      cx.fillStyle='#2E1400';
      cx.beginPath(); cx.roundRect(sx+12, y+12+bob, 34, 9, 4); cx.fill();
      cx.fillStyle='#4E2800';
      cx.beginPath(); cx.roundRect(sx+13, y+11+bob, 32, 8, 4); cx.fill();
      cx.fillStyle='#7A4010';
      cx.beginPath(); cx.roundRect(sx+16, y+10+bob, 26, 6, 3); cx.fill();
      cx.fillStyle='#9A5818';
      cx.beginPath(); cx.roundRect(sx+19, y+10+bob, 20, 3, 2); cx.fill();
    }

    function drawJohnny(sx, y, w, h, f) {
      const p = (rx, ry, rw, rh, col) => { cx.fillStyle = col; cx.fillRect(sx + rx, y + ry, rw, rh); };

      // ── BOTAS ESCURAS ────────────────────────────────────────────────────
      p(2, h - 10, 16, 10, '#1A1A2A');
      p(24, h - 10, 16, 10, '#1A1A2A');
      p(1, h - 5, 17, 5, '#2A2A3A'); // sola
      p(23, h - 5, 17, 5, '#2A2A3A');

      // ── CALÇA AZUL ───────────────────────────────────────────────────────
      p(3, h * 0.55, 16, h * 0.43, '#3A55A8'); // perna esq
      p(25, h * 0.55, 16, h * 0.43, '#3A55A8'); // perna dir
      p(19, h * 0.55, 6, h * 0.43, '#2A3F88'); // divisão
      // faixa branca lateral
      p(f > 0 ? 37 : 3, h * 0.55, 4, h * 0.41, '#FFFFFF');
      // sombra interna pernas
      p(3, h * 0.55, 3, h * 0.43, '#2A3F88');
      p(38, h * 0.55, 3, h * 0.43, '#2A3F88');

      // ── CINTURA ──────────────────────────────────────────────────────────
      p(3, h * 0.51, 38, 6, '#2A3F88');
      p(4, h * 0.52, 36, 4, '#3A4F98');

      // ── TORSO ────────────────────────────────────────────────────────────
      // camisa branca base
      p(4, h * 0.28, 36, h * 0.24, '#E8EEF8');
      // faixas azul/vermelho/azul na camisa
      p(4, h * 0.42, 36, 6, '#3A55A8'); // faixa azul baixo
      p(4, h * 0.40, 36, 3, '#CC2233'); // faixa vermelha
      p(4, h * 0.37, 36, 3, '#3A55A8'); // faixa azul cima
      // ombros azuis
      p(0, h * 0.28, 6, h * 0.24, '#3A55A8');
      p(38, h * 0.28, 6, h * 0.24, '#3A55A8');
      // sombra lateral torso
      p(4, h * 0.28, 3, h * 0.24, '#D0D8F0');
      p(37, h * 0.28, 3, h * 0.24, '#D0D8F0');

      // ── ARMADURA PEITO (esfera) ───────────────────────────────────────────
      p(10, h * 0.28, 24, 18, '#DDEEFF'); // corpo
      p(12, h * 0.29, 20, 8, '#FFFFFF'); // brilho topo
      p(10, h * 0.28, 3, 18, '#AABBCC'); // borda esq
      p(31, h * 0.28, 3, 18, '#AABBCC'); // borda dir
      p(10, h * 0.39, 24, 4, '#AABBCC'); // borda baixo

      // ── BRAÇOS ───────────────────────────────────────────────────────────
      p(0, h * 0.28, 5, h * 0.20, '#E8EEF8'); // braço esq
      p(39, h * 0.28, 5, h * 0.20, '#E8EEF8'); // braço dir

      // ── BANDAGENS PULSO (vermelho/branco) ────────────────────────────────
      p(0, h * 0.46, 6, 4, '#CC2233');
      p(0, h * 0.49, 6, 3, '#FFFFFF');
      p(0, h * 0.51, 6, 3, '#CC2233');
      p(38, h * 0.46, 6, 4, '#CC2233');
      p(38, h * 0.49, 6, 3, '#FFFFFF');
      p(38, h * 0.51, 6, 3, '#CC2233');

      // ── PESCOÇO ──────────────────────────────────────────────────────────
      p(18, h * 0.20, 8, h * 0.09, '#FDBCB4');

      // ── CABELO LOIRO COMPRIDO ─────────────────────────────────────────────
      // mecha lateral (lado de trás)
      const hx = f > 0 ? 2 : 30;
      p(hx, h * 0.04, 12, h * 0.26, '#D4AA20'); // camada de trás
      p(hx + 1, h * 0.05, 9, h * 0.22, '#E8C840'); // camada clara
      p(hx + 2, h * 0.08, 6, h * 0.15, '#F0D050'); // brilho

      // ── ROSTO ────────────────────────────────────────────────────────────
      p(12, h * 0.03, 20, h * 0.20, '#FDBCB4'); // face principal
      p(13, h * 0.21, 18, 5, '#F0A898'); // queixo
      p(14, h * 0.23, 16, 3, '#FDBCB4'); // queixo arredondado
      // bochechas
      p(12, h * 0.13, 3, 4, '#F0A898');
      p(29, h * 0.13, 3, 4, '#F0A898');

      // sobrancelhas loiras
      const sbx = f > 0 ? 26 : 12;
      p(sbx, h * 0.07, 8, 2, '#AA7700');
      p(f > 0 ? 16 : 22, h * 0.07, 6, 2, '#AA7700');

      // olho da frente
      const ex = f > 0 ? 26 : 12;
      p(ex, h * 0.10, 7, 7, '#111111');        // outline
      p(ex + 1, h * 0.11, 5, 5, '#FFFFFF');        // branco
      p(ex + 1, h * 0.11, 5, 5, '#00AACC');        // iris
      p(ex + 2, h * 0.12, 3, 3, '#005577');        // pupila
      p(ex + 2, h * 0.11, 2, 2, '#FFFFFF');        // brilho

      // olho de trás
      const ex2 = f > 0 ? 16 : 22;
      p(ex2, h * 0.10, 6, 6, '#111111');
      p(ex2 + 1, h * 0.11, 4, 4, '#00AACC');
      p(ex2 + 2, h * 0.12, 2, 2, '#005577');
      p(ex2 + 1, h * 0.11, 2, 2, '#FFFFFF');

      // nariz
      p(21, h * 0.16, 4, 3, '#E09080');
      p(20, h * 0.18, 2, 2, '#C07868');
      p(24, h * 0.18, 2, 2, '#C07868');

      // lábios azuis
      p(17, h * 0.20, 10, 4, '#1A8A9A');
      p(18, h * 0.22, 8, 3, '#0A6878');
      p(18, h * 0.20, 7, 2, '#30BBCC'); // brilho

      // ── BOINA BRANCA COM ESTRELAS ────────────────────────────────────────
      // aba inferior (abraça testa)
      p(6, h * 0.01, w - 12, 5, '#CCCCDD');
      p(7, h * 0.01, w - 14, 4, '#EEEEFF');

      // corpo da boina (largo, achatado)
      p(2, -7, w - 4, 9, '#F0F0FF');
      p(0, -5, w, 7, '#EEEEFF');
      p(3, -11, w - 6, 7, '#EEEEFF');
      p(6, -15, w - 12, 5, '#E8E8F8');
      p(10, -17, w - 20, 3, '#DDDDEE');
      // brilho topo
      p(12, -16, w - 24, 2, '#FFFFFF');
      // sombras laterais
      p(0, -5, 4, 7, '#CCCCDD');
      p(w - 4, -5, 4, 7, '#CCCCDD');
      p(3, -11, 4, 6, '#CCCCDD');
      p(w - 7, -11, 4, 6, '#CCCCDD');

      // estrelas azuis (distribuídas pela boina)
      [[4, -3], [11, -9], [20, -4], [28, -8], [7, -12], [23, -13], [15, -6], [32, -4]].forEach(([stx, sty]) => {
        p(stx + 1, sty, 1, 3, '#2244BB');
        p(stx, sty + 1, 3, 1, '#2244BB');
        p(stx + 1, sty + 1, 1, 1, '#4466DD');
      });

      // emblema ferradura dourada (centro)
      const fx = w / 2 - 5, fy = -12;
      p(fx, fy, 10, 11, '#4A2808'); // fundo escuro
      p(fx + 1, fy + 1, 8, 2, '#D4A020'); // topo ferradura
      p(fx + 1, fy + 3, 2, 6, '#D4A020'); // lado esq
      p(fx + 7, fy + 3, 2, 6, '#D4A020'); // lado dir
      p(fx + 2, fy + 1, 5, 1, '#FFD040'); // brilho
      p(fx, fy + 5, 2, 3, '#D4A020'); // gancho esq
      p(fx + 8, fy + 5, 2, 3, '#D4A020'); // gancho dir
    }

    function drawGyro(sx, y, w, h, f) {
      const p = (rx, ry, rw, rh, col) => { cx.fillStyle = col; cx.fillRect(sx + rx, y + ry, rw, rh); };

      // ── CAPA VERDE (camada de trás) ───────────────────────────────────────────
      const cdir = f > 0 ? -1 : 1; // capa cai para o lado oposto ao facing

      // Camada traseira da capa — longa, solta
      cx.fillStyle = '#2E5212';
      cx.beginPath();
      cx.moveTo(sx + w * 0.3, y + h * 0.24);
      cx.bezierCurveTo(
        sx + w * 0.3 + cdir * 10, y + h * 0.40,
        sx + w * 0.3 + cdir * 30, y + h * 0.65,
        sx + w * 0.3 + cdir * 24, y + h + 10
      );
      cx.lineTo(sx + w * 0.5 + cdir * 8, y + h + 10);
      cx.bezierCurveTo(
        sx + w * 0.5 + cdir * 18, y + h * 0.70,
        sx + w * 0.5 + cdir * 5, y + h * 0.42,
        sx + w * 0.5, y + h * 0.24
      );
      cx.closePath(); cx.fill();

      // Camada principal da capa
      cx.fillStyle = '#4A7A1A';
      cx.beginPath();
      cx.moveTo(sx + w * 0.2, y + h * 0.23);
      cx.bezierCurveTo(
        sx + w * 0.2 + cdir * 8, y + h * 0.36,
        sx + w * 0.2 + cdir * 35, y + h * 0.55,
        sx + w * 0.2 + cdir * 30, y + h + 6
      );
      cx.lineTo(sx + w * 0.55 + cdir * 12, y + h + 6);
      cx.bezierCurveTo(
        sx + w * 0.55 + cdir * 22, y + h * 0.60,
        sx + w * 0.55 + cdir * 10, y + h * 0.36,
        sx + w * 0.55, y + h * 0.23
      );
      cx.closePath(); cx.fill();

      // Dobra da capa (cor mais clara, cria volume)
      cx.fillStyle = '#62A028';
      cx.beginPath();
      cx.moveTo(sx + w * 0.35, y + h * 0.28);
      cx.bezierCurveTo(
        sx + w * 0.35 + cdir * 6, y + h * 0.42,
        sx + w * 0.35 + cdir * 20, y + h * 0.62,
        sx + w * 0.35 + cdir * 14, y + h + 4
      );
      cx.lineTo(sx + w * 0.45 + cdir * 10, y + h + 4);
      cx.bezierCurveTo(
        sx + w * 0.45 + cdir * 16, y + h * 0.58,
        sx + w * 0.45 + cdir * 4, y + h * 0.40,
        sx + w * 0.45, y + h * 0.28
      );
      cx.closePath(); cx.fill();

      // Borda/contorno da capa
      cx.strokeStyle = '#7ACC38'; cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(sx + w * 0.2 + cdir * 30, y + h + 6);
      cx.bezierCurveTo(
        sx + w * 0.2 + cdir * 35, y + h * 0.55,
        sx + w * 0.2 + cdir * 8, y + h * 0.36,
        sx + w * 0.2, y + h * 0.23
      );
      cx.stroke(); cx.lineWidth = 1;

      // ── BOTAS ─────────────────────────────────────────────────────────────────
      // Cano da bota (parte alta, marrom médio)
      p(2, h - 26, 16, 14, '#4A2A0E');
      p(25, h - 26, 16, 14, '#4A2A0E');
      p(3, h - 25, 14, 12, '#5C3614'); // frente do cano
      p(26, h - 25, 14, 12, '#5C3614');
      // Brilho no cano
      p(5, h - 24, 5, 8, '#7A4E22');
      p(28, h - 24, 5, 8, '#7A4E22');
      // Costura lateral do cano
      cx.strokeStyle = '#2A1408'; cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(sx + 3, y + h - 26); cx.lineTo(sx + 3, y + h - 12); cx.stroke();
      cx.beginPath(); cx.moveTo(sx + 17, y + h - 26); cx.lineTo(sx + 17, y + h - 12); cx.stroke();
      cx.beginPath(); cx.moveTo(sx + 26, y + h - 26); cx.lineTo(sx + 26, y + h - 12); cx.stroke();
      cx.beginPath(); cx.moveTo(sx + 40, y + h - 26); cx.lineTo(sx + 40, y + h - 12); cx.stroke();

      // Biqueira da bota (parte de baixo, mais escura)
      p(2, h - 13, 16, 13, '#2E1A08');
      p(25, h - 13, 16, 13, '#2E1A08');
      p(3, h - 12, 14, 11, '#3C2210'); // face da biqueira
      p(26, h - 12, 14, 11, '#3C2210');
      // Brilho da biqueira
      p(5, h - 11, 6, 4, '#5A3418');
      p(28, h - 11, 6, 4, '#5A3418');

      // Sola grossa
      p(1, h - 5, 18, 5, '#1A0C04');
      p(24, h - 5, 18, 5, '#1A0C04');
      p(1, h - 2, 18, 2, '#0A0602'); // borda inferior da sola
      p(24, h - 2, 18, 2, '#0A0602');

      // Detalhe metálico no bico da bota
      p(2, h - 8, 5, 3, '#8A7050');
      p(25, h - 8, 5, 3, '#8A7050');
      p(2, h - 8, 3, 2, '#C0A870'); // brilho metal
      p(25, h - 8, 3, 2, '#C0A870');

      // Espora — haste
      cx.strokeStyle = '#A0A0A0'; cx.lineWidth = 1.5;
      cx.beginPath(); cx.moveTo(sx + 4, y + h - 3); cx.lineTo(sx - 7, y + h - 3); cx.stroke();
      cx.beginPath(); cx.moveTo(sx + w - 4, y + h - 3); cx.lineTo(sx + w + 7, y + h - 3); cx.stroke();
      // Espora — roda dentada maior
      cx.lineWidth = 1.2;
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i;
        cx.strokeStyle = '#B8B8B8';
        cx.beginPath();
        cx.moveTo(sx - 7 + Math.cos(a) * 2, y + h - 3 + Math.sin(a) * 2);
        cx.lineTo(sx - 7 + Math.cos(a) * 5, y + h - 3 + Math.sin(a) * 5);
        cx.stroke();
        cx.beginPath();
        cx.moveTo(sx + w + 7 + Math.cos(a) * 2, y + h - 3 + Math.sin(a) * 2);
        cx.lineTo(sx + w + 7 + Math.cos(a) * 5, y + h - 3 + Math.sin(a) * 5);
        cx.stroke();
      }
      cx.fillStyle = '#D0D0D0';
      cx.beginPath(); cx.arc(sx - 7, y + h - 3, 3, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(sx + w + 7, y + h - 3, 3, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#A0A0A0';
      cx.beginPath(); cx.arc(sx - 7, y + h - 3, 1.5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(sx + w + 7, y + h - 3, 1.5, 0, Math.PI * 2); cx.fill();

      // ── CALÇA BEGE ────────────────────────────────────────────────────────────
      p(4, h * 0.50, 16, h * 0.49, '#C8A055');
      p(26, h * 0.50, 16, h * 0.49, '#C8A055');
      p(20, h * 0.50, 6, h * 0.49, '#A88040');
      p(4, h * 0.50, 3, h * 0.46, '#A88040');
      p(39, h * 0.50, 3, h * 0.46, '#A88040');
      // Joelheira roxa
      p(4, h * 0.67, 15, 9, '#5A2A90');
      p(27, h * 0.67, 15, 9, '#5A2A90');
      p(5, h * 0.68, 13, 7, '#7040B0');

      // ── CINTO MARROM ──────────────────────────────────────────────────────────
      p(3, h * 0.47, 40, 5, '#7A4A18');
      p(3, h * 0.48, 40, 3, '#9A6228');
      p(17, h * 0.46, 12, 6, '#C8A020'); // fivela
      p(18, h * 0.47, 10, 4, '#FFD040');
      p(20, h * 0.47, 6, 4, '#8B6010'); // detalhe fivela

      // ── CAMISA ROXA ───────────────────────────────────────────────────────────
      p(4, h * 0.24, 38, h * 0.24, '#6040A8');
      p(4, h * 0.24, 4, h * 0.24, '#482880');
      p(38, h * 0.24, 4, h * 0.24, '#482880');
      p(10, h * 0.24, 26, h * 0.18, '#7050B8');
      // Gola V
      cx.fillStyle = '#FDBCB4';
      cx.beginPath();
      cx.moveTo(sx + 14, y + h * 0.24); cx.lineTo(sx + 23, y + h * 0.37);
      cx.lineTo(sx + 32, y + h * 0.24); cx.lineTo(sx + 28, y + h * 0.24);
      cx.lineTo(sx + 23, y + h * 0.34); cx.lineTo(sx + 18, y + h * 0.24);
      cx.closePath(); cx.fill();
      // Botões dourados
      [[20, 0.27], [20, 0.32], [20, 0.38]].forEach(([bx, by]) => {
        p(bx, by, 5, 3, '#C8A000');
        p(bx + 1, by, 3, 2, '#FFD040');
      });

      // ── BANDAGENS LARANJA (braços superiores) ─────────────────────────────────
      p(-1, h * 0.26, 6, 7, '#D06818');
      p(-1, h * 0.28, 6, 5, '#F08030');
      p(41, h * 0.26, 6, 7, '#D06818');
      p(41, h * 0.28, 6, 5, '#F08030');

      // ── BRAÇOS ────────────────────────────────────────────────────────────────
      p(-1, h * 0.33, 6, h * 0.13, '#6040A8');
      p(41, h * 0.33, 6, h * 0.13, '#6040A8');

      // ── BANDAGENS LARANJA (pulsos) ────────────────────────────────────────────
      p(-1, h * 0.43, 7, 5, '#D06818');
      p(-1, h * 0.46, 7, 4, '#F08030');
      p(-1, h * 0.49, 7, 3, '#D06818');
      p(40, h * 0.43, 7, 5, '#D06818');
      p(40, h * 0.46, 7, 4, '#F08030');
      p(40, h * 0.49, 7, 3, '#D06818');

      // ── PESCOÇO ───────────────────────────────────────────────────────────────
      p(18, h * 0.17, 10, h * 0.08, '#FDBCB4');

      // ── CABELO LOIRO LONGO ────────────────────────────────────────────────────
      // Mecha esquerda
      cx.fillStyle = '#C89818';
      cx.beginPath();
      cx.moveTo(sx + 6, y + h * 0.10);
      cx.bezierCurveTo(sx + 0, y + h * 0.22, sx - 2, y + h * 0.40, sx + 2, y + h * 0.52);
      cx.lineTo(sx + 10, y + h * 0.52);
      cx.bezierCurveTo(sx + 6, y + h * 0.36, sx + 8, y + h * 0.18, sx + 12, y + h * 0.10);
      cx.closePath(); cx.fill();
      cx.fillStyle = '#E0B020';
      cx.beginPath();
      cx.moveTo(sx + 7, y + h * 0.10);
      cx.bezierCurveTo(sx + 2, y + h * 0.20, sx + 1, y + h * 0.36, sx + 4, y + h * 0.48);
      cx.lineTo(sx + 9, y + h * 0.48);
      cx.bezierCurveTo(sx + 6, y + h * 0.32, sx + 8, y + h * 0.16, sx + 11, y + h * 0.10);
      cx.closePath(); cx.fill();
      // Mecha direita
      cx.fillStyle = '#C89818';
      cx.beginPath();
      cx.moveTo(sx + w - 6, y + h * 0.10);
      cx.bezierCurveTo(sx + w + 0, y + h * 0.22, sx + w + 2, y + h * 0.40, sx + w - 2, y + h * 0.52);
      cx.lineTo(sx + w - 10, y + h * 0.52);
      cx.bezierCurveTo(sx + w - 6, y + h * 0.36, sx + w - 8, y + h * 0.18, sx + w - 12, y + h * 0.10);
      cx.closePath(); cx.fill();
      cx.fillStyle = '#E0B020';
      cx.beginPath();
      cx.moveTo(sx + w - 7, y + h * 0.10);
      cx.bezierCurveTo(sx + w - 2, y + h * 0.20, sx + w - 1, y + h * 0.36, sx + w - 4, y + h * 0.48);
      cx.lineTo(sx + w - 9, y + h * 0.48);
      cx.bezierCurveTo(sx + w - 6, y + h * 0.32, sx + w - 8, y + h * 0.16, sx + w - 11, y + h * 0.10);
      cx.closePath(); cx.fill();

      // ── ROSTO ────────────────────────────────────────────────────────────────
      p(11, h * 0.04, 24, h * 0.16, '#FDBCB4');
      p(12, h * 0.17, 22, 5, '#F0A898'); // queixo
      p(13, h * 0.19, 20, 3, '#FDBCB4');
      p(11, h * 0.11, 3, 4, '#EFA090'); // bochecha esq
      p(32, h * 0.11, 3, 4, '#EFA090'); // bochecha dir

      // Sobrancelhas verdes (traço do Gyro)
      const sbx = f > 0 ? 28 : 13;
      p(sbx, h * 0.07, 8, 2, '#228822');
      p(f > 0 ? 18 : 23, h * 0.07, 6, 2, '#228822');

      // Olhos verdes
      const ex = f > 0 ? 28 : 13;
      p(ex, h * 0.10, 7, 6, '#111111');
      p(ex + 1, h * 0.11, 5, 4, '#FFFFFF');
      p(ex + 1, h * 0.11, 5, 4, '#22AA44');
      p(ex + 2, h * 0.12, 3, 3, '#006622');
      p(ex + 2, h * 0.11, 2, 2, '#FFFFFF');
      const ex2 = f > 0 ? 18 : 23;
      p(ex2, h * 0.10, 6, 6, '#111111');
      p(ex2 + 1, h * 0.11, 4, 4, '#22AA44');
      p(ex2 + 2, h * 0.12, 2, 2, '#006622');
      p(ex2 + 1, h * 0.11, 2, 2, '#FFFFFF');

      // Nariz
      p(21, h * 0.15, 4, 3, '#E09080');
      p(20, h * 0.17, 2, 2, '#C07868');
      p(24, h * 0.17, 2, 2, '#C07868');

      // Boca — lábios verdes com dentes amarelos (estilo Gyro)
      p(14, h * 0.19, 18, 6, '#0A4A0A'); // fundo boca / lábio superior verde escuro
      p(14, h * 0.19, 18, 2, '#22AA22'); // lábio superior verde
      p(15, h * 0.20, 16, 4, '#EED820'); // dentes amarelos
      p(15, h * 0.20, 2, 4, '#0A4A0A'); // marcas entre dentes
      p(18, h * 0.20, 2, 4, '#0A4A0A');
      p(21, h * 0.20, 2, 4, '#0A4A0A');
      p(24, h * 0.20, 2, 4, '#0A4A0A');
      p(27, h * 0.20, 2, 4, '#0A4A0A');
      p(14, h * 0.23, 18, 2, '#22AA22'); // lábio inferior verde

      // ── CHAPÉU DO GYRO (forma clássica cowboy + textura marrom + ranhuras) ────
      const hx = sx + w / 2, hy = y;

      // Aba larga (elipse, estilo antigo)
      cx.fillStyle = '#7A5530';
      cx.beginPath(); cx.ellipse(hx, hy + h * 0.04, w / 2 + 8, 5, 0, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#9A6D42';
      cx.beginPath(); cx.ellipse(hx, hy + h * 0.03, w / 2 + 6, 4, 0, 0, Math.PI * 2); cx.fill();

      // Copa alta retangular
      p(6, -18, w - 12, 22, '#8A5C34');
      p(7, -20, w - 14, 22, '#A06A3C');
      p(9, -22, w - 18, 8, '#7A4E2A'); // topo
      p(11, -20, w - 22, 5, '#C48850'); // brilho topo
      // Sombras laterais da copa
      p(6, -18, 4, 22, '#5A3518');
      p(w - 10, -18, 4, 22, '#5A3518');

      // Faixa escura na base da copa
      p(6, h * 0.01, w - 12, 4, '#5A3518');
      p(7, h * 0.01, w - 14, 3, '#7A4A22');

      // Ranhuras de ventilação nos lados da copa
      cx.fillStyle = '#3A2010';
      cx.beginPath(); cx.roundRect(sx + 6, hy - 16, 7, 4, 1); cx.fill();
      cx.beginPath(); cx.roundRect(sx + 6, hy - 10, 7, 4, 1); cx.fill();
      cx.beginPath(); cx.roundRect(sx + w - 13, hy - 16, 7, 4, 1); cx.fill();
      cx.beginPath(); cx.roundRect(sx + w - 13, hy - 10, 7, 4, 1); cx.fill();
      // Sombra interna das ranhuras
      cx.fillStyle = 'rgba(0,0,0,0.5)';
      cx.beginPath(); cx.roundRect(sx + 7, hy - 15, 5, 2, 1); cx.fill();
      cx.beginPath(); cx.roundRect(sx + 7, hy - 9, 5, 2, 1); cx.fill();
      cx.beginPath(); cx.roundRect(sx + w - 12, hy - 15, 5, 2, 1); cx.fill();
      cx.beginPath(); cx.roundRect(sx + w - 12, hy - 9, 5, 2, 1); cx.fill();
    }


    function drawStar(cx2, cy2, outerR, innerR, points) {
      cx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const a = (Math.PI / points) * i - Math.PI / 2;
        i === 0 ? cx.moveTo(cx2 + Math.cos(a) * r, cy2 + Math.sin(a) * r)
          : cx.lineTo(cx2 + Math.cos(a) * r, cy2 + Math.sin(a) * r);
      }
      cx.closePath(); cx.fill();
    }

    function drawChar(e, bodyCol, blink) {
      const sx = e.x - camX;
      if (sx < -70 || sx > W + 70) return;
      if (blink && Math.floor(frame / 4) % 2 === 0) return;

      // Cavalo (Johnny e Gyro montados)
      const onHorse = e === player && player.onHorse;
      if (onHorse) {
        const gallop = Math.abs(e.vx) > 1.5;
        const whiteHorse = player.ci === 0 || player.ci === 2;
        drawHorse(sx - 14, e.y + 28, e.facing, gallop, whiteHorse);
      }

      const isJohnny = e === player && player.ci === 0;
      const isGyro = e === player && player.ci === 1;
      const isDiego = e === player && player.ci === 2;
      const f = e.facing;

      if (isJohnny) {
        drawJohnny(sx, e.y, e.w, e.h, f);
      } else if (isGyro) {
        drawGyro(sx, e.y, e.w, e.h, f);
      } else if (isDiego) {
        drawDiego(sx, e.y, e.w, e.h, f, player.dinoForm);
      } else {
        // Inimigos genéricos (e fallback Gyro sem imagem)
        cx.fillStyle = bodyCol;
        cx.fillRect(sx, e.y, e.w, e.h);
        cx.fillStyle = 'rgba(0,0,0,0.2)';
        cx.fillRect(sx, e.y + e.h * 0.35, e.w, e.h * 0.65);
        cx.fillStyle = '#FDBCB4';
        cx.fillRect(sx + e.w * 0.18, e.y, e.w * 0.64, e.h * 0.33);
        cx.fillStyle = '#3A1A00';
        cx.fillRect(sx + e.w * 0.05, e.y - 7, e.w * 0.9, 5);
        cx.fillRect(sx + e.w * 0.22, e.y - 18, e.w * 0.56, 13);
        cx.fillStyle = '#8B4513';
        cx.fillRect(sx + e.w * 0.22, e.y - 9, e.w * 0.56, 4);
        cx.fillStyle = '#1A1A1A';
        const ex2 = f > 0 ? sx + e.w * 0.58 : sx + e.w * 0.22;
        cx.fillRect(ex2, e.y + 5, 4, 4);
      }

      // Tusk no ombro (Johnny)
      if (e === player && player.ci === 0 && player.tuskTimer > 0) {
        const fade = player.tuskTimer < 180 ? player.tuskTimer / 180 : 1;
        const shoulderX = sx + (e.facing > 0 ? e.w + 2 : -18);
        const shoulderY = e.y + 4;
        const bob2 = Math.sin(frame * 0.18) * 2;
        drawTusk(shoulderX, shoulderY + bob2, player.tuskAct, fade);
      }
    }

    function drawDiego(sx, y, w, h, f, dino) {
      const p = (rx, ry, rw, rh, col) => { cx.fillStyle = col; cx.fillRect(sx + rx, y + ry, rw, rh); };

      if (dino) {
        // ── SCARY MONSTERS (baseado no design oficial) ─────────────────────────
        const bob = Math.sin(frame * 0.18) * 2;
        const TEAL  = '#2AB8B4', TEAL2 = '#3CCCC8', TEALDK = '#0E8884';
        const BLUE  = '#1A3898', BLUE2 = '#2A50C0';
        const CREAM = '#E8E0A8', GOLD  = '#E8C020', GOLDDM = '#C09000';

        // ── CAUDA LONGA ────────────────────────────────────────────────────────
        const tOx = f > 0 ? -50 : w + 50; // ponta da cauda
        cx.fillStyle = BLUE;
        cx.beginPath();
        cx.moveTo(sx + (f>0?8:w-8), y + h*0.55 + bob);
        cx.bezierCurveTo(sx+(f>0?-10:w+10), y+h*0.50+bob, sx+(f>0?-35:w+35), y+h*0.44+bob, sx+tOx, y+h*0.38+bob);
        cx.lineTo(sx+tOx+(f>0?2:-2), y+h*0.44+bob);
        cx.bezierCurveTo(sx+(f>0?-28:w+28), y+h*0.52+bob, sx+(f>0?-6:w+6), y+h*0.62+bob, sx+(f>0?12:w-12), y+h*0.62+bob);
        cx.closePath(); cx.fill();
        // barriga da cauda (creme)
        cx.fillStyle = CREAM;
        cx.beginPath();
        cx.moveTo(sx+(f>0?6:w-6), y+h*0.58+bob);
        cx.bezierCurveTo(sx+(f>0?-8:w+8), y+h*0.54+bob, sx+(f>0?-28:w+28), y+h*0.47+bob, sx+tOx+(f>0?1:-1), y+h*0.41+bob);
        cx.lineTo(sx+tOx+(f>0?2:-2), y+h*0.44+bob);
        cx.bezierCurveTo(sx+(f>0?-24:w+24), y+h*0.52+bob, sx+(f>0?-4:w+4), y+h*0.60+bob, sx+(f>0?10:w-10), y+h*0.62+bob);
        cx.closePath(); cx.fill();

        // ── PERNAS (cor do corpo) ──────────────────────────────────────────────
        // perna traseira
        p(f>0?6:w-20, h*0.55, 14, h*0.45, TEALDK);
        p(f>0?7:w-19, h*0.54, 12, h*0.44, TEAL);
        // perna dianteira
        p(f>0?14:w-28, h*0.52+bob, 16, h*0.48, TEALDK);
        p(f>0?15:w-27, h*0.51+bob, 14, h*0.46, TEAL);
        // garras pé dianteiro (douradas)
        const fp = f>0?14:w-28;

        }

        // ── CORPO TEAL (torso) ─────────────────────────────────────────────────
        cx.fillStyle = TEALDK;

        cx.fillStyle = TEAL;
        cx.beginPath(); cx.roundRect(sx+5, y+h*0.26+bob, w-10, h*0.30, 8); cx.fill();
        cx.fillStyle = TEAL2;
        cx.beginPath(); cx.roundRect(sx+7, y+h*0.26+bob, 10, h*0.28, [8,4,4,8]); cx.fill();
        // barriga creme

        cx.beginPath(); cx.ellipse(sx+w/2, y+h*0.46+bob, 10, 8, 0, 0, Math.PI*2); cx.fill();
        // marcas "DIO" no corpo
        cx.strokeStyle = TEALDK; cx.lineWidth = 1.5;

        // ── BRAÇOS PEQUENOS (teal) ─────────────────────────────────────────────
        const aX = f>0 ? w-10 : -2;
        cx.fillStyle = TEAL;
        cx.beginPath(); cx.roundRect(sx+aX, y+h*0.30+bob, 11, 16, 4); cx.fill();
        // garras mão (douradas)
        for (let i = 0; i < 3; i++) {
          cx.fillStyle = GOLDDM;
          cx.beginPath(); cx.moveTo(sx+aX+(f>0?i*4:10-i*4), y+h*0.44+bob); cx.lineTo(sx+aX+(f>0?i*4-4:14-i*4), y+h*0.44+bob+9); cx.lineTo(sx+aX+(f>0?i*4+3:7-i*4), y+h*0.44+bob); cx.fill();
          cx.fillStyle = GOLD;
          cx.beginPath(); cx.moveTo(sx+aX+(f>0?i*4:10-i*4), y+h*0.44+bob); cx.lineTo(sx+aX+(f>0?i*4-3:13-i*4), y+h*0.44+bob+7); cx.lineTo(sx+aX+(f>0?i*4+2:6-i*4), y+h*0.44+bob); cx.fill();
        }

        // ── CABEÇA GRANDE ─────────────────────────────────────────────────────
        const hbX = f>0 ? w*0.30 : -w*0.10;
        const hy = 12; // offset para juntar cabeça ao corpo
        // crânio
        cx.fillStyle = TEALDK;
        cx.beginPath(); cx.roundRect(sx+hbX, y-14+hy+bob, 34, 22, 6); cx.fill();
        cx.fillStyle = TEAL;
        cx.beginPath(); cx.roundRect(sx+hbX+1, y-15+hy+bob, 32, 20, 6); cx.fill();
        cx.fillStyle = TEAL2;
        cx.beginPath(); cx.roundRect(sx+hbX+2, y-14+hy+bob, 18, 8, 4); cx.fill();

        // espinhos dourados no topo
        for (let i = 0; i < 5; i++) {
          const spX = sx+hbX+6+i*6;
          const spH = 6 + (i===2?4:i===1||i===3?2:0);
          cx.fillStyle = GOLDDM;
          cx.beginPath(); cx.moveTo(spX-2, y-14+hy+bob); cx.lineTo(spX, y-14-spH+hy+bob); cx.lineTo(spX+2, y-14+hy+bob); cx.fill();
          cx.fillStyle = GOLD;
          cx.beginPath(); cx.moveTo(spX-1, y-14+hy+bob); cx.lineTo(spX, y-13-spH+hy+bob); cx.lineTo(spX+1, y-14+hy+bob); cx.fill();
        }

        // focinho + boca aberta
        const snX = f>0 ? sx+hbX+22 : sx+hbX-8;
        cx.fillStyle = TEAL;
        cx.beginPath(); cx.roundRect(snX, y-8+hy+bob, 20, 10, [0,4,4,0]); cx.fill();
        // mandíbula inferior
        cx.fillStyle = TEALDK;
        cx.beginPath(); cx.roundRect(snX, y+2+hy+bob, 20, 8, [0,0,4,4]); cx.fill();
        cx.fillStyle = TEAL;
        cx.beginPath(); cx.roundRect(snX+1, y+3+hy+bob, 18, 6, [0,0,3,3]); cx.fill();
        // interior boca
        cx.fillStyle = '#E06060';
        cx.beginPath(); cx.roundRect(snX+1, y-2+hy+bob, 17, 10, 2); cx.fill();
        cx.fillStyle = '#F08080';
        cx.beginPath(); cx.ellipse(snX+9, y+4+hy+bob, 6, 4, 0, 0, Math.PI); cx.fill();
        // dentes superiores
        for (let i = 0; i < 5; i++) p(hbX+22+(f>0?i*3:-30+i*3), -2+hy+bob, 2, 5, '#F0F0EE');
        // dentes inferiores
        for (let i = 0; i < 4; i++) p(hbX+23+(f>0?i*3:-28+i*3), 4+hy+bob, 2, 4, '#F0F0EE');

        // olho
        const eyX = f>0 ? hbX+14 : hbX+12;
        p(eyX, -10+hy+bob, 7, 6, '#0A0A0A');
        p(eyX+1, -9+hy+bob, 5, 4, '#EECC00');
        p(eyX+2, -8+hy+bob, 3, 3, '#000');
        p(eyX+2, -9+hy+bob, 2, 2, '#FFF');

      } else {
        // ── FORMA HUMANA ──────────────────────────────────────────────────────
        const bob = Math.abs(player.vx) > 2 ? Math.sin(frame * 0.32) * 2 : 0;

        // ── BOTAS MARRONS ─────────────────────────────────────────────────────
        p(2,  h - 10, 16, 10, '#3A1E0A'); // bota esq
        p(24, h - 10, 16, 10, '#3A1E0A'); // bota dir
        p(3,  h - 9,  12,  7, '#5A3018'); // highlight esq
        p(25, h - 9,  12,  7, '#5A3018'); // highlight dir
        p(1,  h - 5,  17,  5, '#1A0C04'); // sola esq
        p(23, h - 5,  17,  5, '#1A0C04'); // sola dir
        // faixa branca tornozelo
        p(2,  h - 11, 16, 2, '#D8D0C0');
        p(24, h - 11, 16, 2, '#D8D0C0');
        // esporas prateadas
        cx.strokeStyle = '#C8C8C4'; cx.lineWidth = 1.5;
        cx.beginPath(); cx.moveTo(sx+2, y+h-3); cx.lineTo(sx-6, y+h-3); cx.stroke();
        cx.beginPath(); cx.moveTo(sx+w-2, y+h-3); cx.lineTo(sx+w+6, y+h-3); cx.stroke();
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI*2/6)*i;
          cx.beginPath(); cx.moveTo(sx-6+Math.cos(a)*2, y+h-3+Math.sin(a)*2); cx.lineTo(sx-6+Math.cos(a)*5, y+h-3+Math.sin(a)*5); cx.stroke();
          cx.beginPath(); cx.moveTo(sx+w+6+Math.cos(a)*2, y+h-3+Math.sin(a)*2); cx.lineTo(sx+w+6+Math.cos(a)*5, y+h-3+Math.sin(a)*5); cx.stroke();
        }
        cx.lineWidth = 1;

        // ── CALÇAS CREME ──────────────────────────────────────────────────────
        p(3,  h*0.55, 16, h*0.43, '#D4C888'); // perna esq
        p(25, h*0.55, 16, h*0.43, '#D4C888'); // perna dir
        p(19, h*0.55,  6, h*0.43, '#B8AC70'); // divisão central
        p(f>0 ? 35 : 3, h*0.55, 4, h*0.30, '#EDE090'); // faixa lateral clara
        p(3,  h*0.55, 3, h*0.43, '#B8AC70'); // sombra esq
        p(38, h*0.55, 3, h*0.43, '#B8AC70'); // sombra dir

        // ── CINTURA ───────────────────────────────────────────────────────────
        p(3, h*0.51, 38, 6, '#B8AC70');
        p(4, h*0.52, 36, 4, '#C8BC80');

        // ── CINTO BRANCO com fivela DIO ───────────────────────────────────────
        p(3, h*0.49, 38, 4, '#E0DDD0');
        const bkx = f > 0 ? 19 : 15;
        p(bkx, h*0.48, 10, 6, '#C8980A');
        p(bkx+1, h*0.49, 8, 4, '#E0B020');

        // ── TORSO — CAMISA TEAL CLARA com grade dourada ───────────────────────
        p(4, h*0.28, 36, h*0.24, '#3ABCB8');
        p(5, h*0.27, 34, h*0.22, '#5AD0CC');
        p(6, h*0.27, 10, h*0.20, '#72DCD8'); // highlight lateral
        // grade dourada proeminente
        cx.save();
        cx.beginPath(); cx.rect(sx+4, y+h*0.27, 34, h*0.24); cx.clip();
        cx.strokeStyle = '#B87000'; cx.lineWidth = 1.5;
        for (let gx = -8; gx < 48; gx += 10) {
          cx.beginPath(); cx.moveTo(sx+4+gx, y+h*0.27); cx.lineTo(sx+4+gx+22, y+h*0.51); cx.stroke();
          cx.beginPath(); cx.moveTo(sx+4+gx, y+h*0.51); cx.lineTo(sx+4+gx+22, y+h*0.27); cx.stroke();
        }
        cx.restore();
        // ombros
        p(0,  h*0.28, 6, h*0.24, '#2A9894');
        p(38, h*0.28, 6, h*0.24, '#2A9894');

        // ── BRAÇOS (manga teal + luva marrom) ─────────────────────────────────
        p(0,  h*0.28, 5, h*0.20, '#5AD0CC');
        p(39, h*0.28, 5, h*0.20, '#5AD0CC');
        p(0,  h*0.46, 6, 6, '#6A3C18');
        p(0,  h*0.50, 6, 3, '#4A2810');
        p(38, h*0.46, 6, 6, '#6A3C18');
        p(38, h*0.50, 6, 3, '#4A2810');

        // ── PESCOÇO + GOLA ALTA ───────────────────────────────────────────────
        p(18, h*0.20, 8, h*0.09, '#FDBCB4');
        p(15, h*0.22, 14, h*0.07, '#3ABCB8');
        p(16, h*0.21, 12, h*0.05, '#5AD0CC');

        // ── CABELO LOIRO (mechas fluidas dos dois lados) ──────────────────────
        // mecha traseira — laranja/ruivo
        cx.fillStyle = '#A84A10';
        cx.beginPath();
        cx.moveTo(sx+(f>0?6:w-6), y+h*0.06+bob);
        cx.bezierCurveTo(sx+(f>0?0:w), y+h*0.18+bob, sx+(f>0?-2:w+2), y+h*0.36+bob, sx+(f>0?2:w-2), y+h*0.50+bob);
        cx.lineTo(sx+(f>0?10:w-10), y+h*0.50+bob);
        cx.bezierCurveTo(sx+(f>0?6:w-6), y+h*0.32+bob, sx+(f>0?8:w-8), y+h*0.16+bob, sx+(f>0?12:w-12), y+h*0.06+bob);
        cx.closePath(); cx.fill();
        cx.fillStyle = '#D06820'; // camada laranja clara
        cx.beginPath();
        cx.moveTo(sx+(f>0?7:w-7), y+h*0.06+bob);
        cx.bezierCurveTo(sx+(f>0?2:w-2), y+h*0.16+bob, sx+(f>0?1:w-1), y+h*0.32+bob, sx+(f>0?4:w-4), y+h*0.46+bob);
        cx.lineTo(sx+(f>0?9:w-9), y+h*0.46+bob);
        cx.bezierCurveTo(sx+(f>0?6:w-6), y+h*0.28+bob, sx+(f>0?8:w-8), y+h*0.14+bob, sx+(f>0?11:w-11), y+h*0.06+bob);
        cx.closePath(); cx.fill();
        // mecha frontal — mecha amarela/loira (destaque)
        cx.fillStyle = '#C86010';
        cx.beginPath();
        cx.moveTo(sx+(f>0?w-8:8), y+h*0.02+bob);
        cx.bezierCurveTo(sx+(f>0?w-4:4), y+h*0.10+bob, sx+(f>0?w-2:2), y+h*0.20+bob, sx+(f>0?w-6:6), y+h*0.26+bob);
        cx.lineTo(sx+(f>0?w-10:10), y+h*0.26+bob);
        cx.bezierCurveTo(sx+(f>0?w-8:8), y+h*0.16+bob, sx+(f>0?w-10:10), y+h*0.08+bob, sx+(f>0?w-12:12), y+h*0.02+bob);
        cx.closePath(); cx.fill();
        cx.fillStyle = '#EEC030'; // streak amarelo brilhante
        cx.beginPath();
        cx.moveTo(sx+(f>0?w-9:9), y+h*0.03+bob);
        cx.bezierCurveTo(sx+(f>0?w-6:6), y+h*0.10+bob, sx+(f>0?w-4:4), y+h*0.18+bob, sx+(f>0?w-8:8), y+h*0.23+bob);
        cx.lineTo(sx+(f>0?w-11:11), y+h*0.23+bob);
        cx.bezierCurveTo(sx+(f>0?w-9:9), y+h*0.14+bob, sx+(f>0?w-10:10), y+h*0.07+bob, sx+(f>0?w-12:12), y+h*0.03+bob);
        cx.closePath(); cx.fill();

        // ── ROSTO (pele clara) ────────────────────────────────────────────────
        p(12, h*0.03+bob, 20, h*0.21, '#FDBCB4'); // face
        p(12, h*0.03+bob,  3, h*0.21, '#EAA090'); // sombra lateral esq
        p(29, h*0.03+bob,  3, h*0.21, '#EAA090'); // sombra lateral dir
        p(13, h*0.22+bob, 18,       5, '#EAA090'); // queixo sombra
        p(14, h*0.23+bob, 16,       3, '#FDBCB4'); // queixo
        p(12, h*0.12+bob,  3,       5, '#F0A898'); // bochecha esq
        p(29, h*0.12+bob,  3,       5, '#F0A898'); // bochecha dir

        // sobrancelhas escuras e grossas (expressão intensa)
        const sbxD = f > 0 ? 25 : 11;
        p(sbxD,          h*0.055+bob, 9, 4, '#1A0C00'); // sombra/espessura
        p(sbxD,          h*0.055+bob, 9, 3, '#2A1408'); // sobrancelha escura
        p(f>0 ? 15 : 21, h*0.065+bob, 7, 3, '#2A1408'); // sobrancelha traseira

        // olho da frente — VERDE intenso
        const exD = f > 0 ? 25 : 11;
        p(exD,   h*0.10+bob, 8, 8, '#0A0A0A');  // outline
        p(exD+1, h*0.11+bob, 6, 6, '#FFFFFF');  // esclera
        p(exD+1, h*0.11+bob, 6, 6, '#22BB44');  // iris verde
        p(exD+2, h*0.12+bob, 4, 4, '#005522');  // pupila escura
        p(exD+2, h*0.11+bob, 2, 2, '#FFFFFF');  // brilho principal
        p(exD+5, h*0.13+bob, 1, 1, '#AAFFAA');  // brilho secundário
        // cílios superiores (traço do Diego)
        cx.strokeStyle = '#0A0A0A'; cx.lineWidth = 1;
        cx.beginPath(); cx.moveTo(sx+exD, y+h*0.10+bob); cx.lineTo(sx+exD-1, y+h*0.09+bob); cx.stroke();
        cx.beginPath(); cx.moveTo(sx+exD+3, y+h*0.10+bob); cx.lineTo(sx+exD+3, y+h*0.085+bob); cx.stroke();
        cx.beginPath(); cx.moveTo(sx+exD+6, y+h*0.10+bob); cx.lineTo(sx+exD+7, y+h*0.09+bob); cx.stroke();

        // olho de trás — menor, verde
        const exD2 = f > 0 ? 15 : 21;
        p(exD2,   h*0.10+bob, 7, 7, '#0A0A0A');
        p(exD2+1, h*0.11+bob, 5, 5, '#FFFFFF');
        p(exD2+1, h*0.11+bob, 5, 5, '#22BB44');
        p(exD2+2, h*0.12+bob, 3, 3, '#005522');
        p(exD2+1, h*0.11+bob, 2, 2, '#FFFFFF');


        // boca — mesmo estilo dos outros personagens
        p(17, h*0.21+bob, 10, 4, '#8A4A3A');
        p(18, h*0.21+bob,  8, 3, '#A85A48');
        p(18, h*0.20+bob,  7, 2, '#C87858'); // brilho
        cx.lineWidth = 1;

        // ── BONÉ TEAL (jóquei — copa arredondada + viseira bezier) ───────────
        // faixa inferior
        p(w*0.14, h*0.01+bob, w*0.72, 4, '#0E7070');
        p(w*0.15, h*0.01+bob, w*0.70, 3, '#1A9E98');
        // copa arredondada
        cx.fillStyle = '#158A84';
        cx.beginPath(); cx.roundRect(sx+w*0.16, y-12+bob, w*0.68, 14, [8,8,2,2]); cx.fill();
        cx.fillStyle = '#1AA8A0';
        cx.beginPath(); cx.roundRect(sx+w*0.18, y-11+bob, w*0.64, 12, [7,7,2,2]); cx.fill();
        // brilho copa
        cx.fillStyle = 'rgba(255,255,255,0.18)';
        cx.beginPath(); cx.roundRect(sx+w*0.22, y-10+bob, w*0.28, 5, 3); cx.fill();
        // viseira bezier na direção do facing
        const visDir = f > 0;
        cx.fillStyle = '#0E6A64';
        cx.beginPath();
        cx.moveTo(visDir ? sx+w*0.40 : sx+w*0.60, y+bob);
        cx.lineTo(visDir ? sx+w*0.90 : sx-w*0.10, y+bob-1);
        cx.lineTo(visDir ? sx+w*0.88 : sx-w*0.08, y+bob+4);
        cx.lineTo(visDir ? sx+w*0.38 : sx+w*0.62, y+bob+4);
        cx.closePath(); cx.fill();
        cx.fillStyle = 'rgba(255,255,255,0.12)';
        cx.beginPath();
        cx.moveTo(visDir ? sx+w*0.42 : sx+w*0.58, y+bob+1);
        cx.lineTo(visDir ? sx+w*0.82 : sx+w*0.02, y+bob);
        cx.lineTo(visDir ? sx+w*0.80 : sx+w*0.04, y+bob+2);
        cx.lineTo(visDir ? sx+w*0.40 : sx+w*0.60, y+bob+2);
        cx.closePath(); cx.fill();
        // "DIO" dourado
        cx.fillStyle = '#E8C020'; cx.font = 'bold 7px sans-serif'; cx.textAlign = 'center';
        cx.fillText('DIO', sx+w*0.5, y-3+bob);
        cx.textAlign = 'left';
      }
    }

    function drawTusk(x, y, act, alpha) {
      cx.save();
      cx.globalAlpha = alpha;
      const bob = Math.sin(frame * 0.12) * 3;
      const yy = y + bob;

      const sc = 0.7 + act * 0.15;
      cx.save();
      cx.translate(x + 20, yy + 30);
      cx.scale(sc, sc);
      cx.translate(-20, -30);

      function st(ox, oy, r) {
        cx.beginPath();
        for (let i = 0; i < 10; i++) {
          const rr = i % 2 === 0 ? r : r * 0.4, a = (Math.PI / 5) * i - Math.PI / 2;
          i === 0 ? cx.moveTo(ox + Math.cos(a) * rr, oy + Math.sin(a) * rr)
            : cx.lineTo(ox + Math.cos(a) * rr, oy + Math.sin(a) * rr);
        }
        cx.closePath(); cx.fill();
      }
      function ht(ox, oy, r) {
        cx.beginPath();
        cx.moveTo(ox, oy + r * 0.5);
        cx.bezierCurveTo(ox, oy - r, ox - r * 2.2, oy - r, ox - r * 2.2, oy + r * 0.5);
        cx.bezierCurveTo(ox - r * 2.2, oy + r * 2, ox, oy + r * 3, ox, oy + r * 3);
        cx.bezierCurveTo(ox, oy + r * 3, ox + r * 2.2, oy + r * 2, ox + r * 2.2, oy + r * 0.5);
        cx.bezierCurveTo(ox + r * 2.2, oy - r, ox, oy - r, ox, oy + r * 0.5);
        cx.closePath(); cx.fill();
      }

      // ── BRACINHOS ───────────────────────────────────────────────────────
      cx.fillStyle = '#C03888';
      cx.beginPath(); cx.moveTo(4, 22); cx.lineTo(-8, 18); cx.lineTo(-6, 28); cx.lineTo(6, 30); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(36, 22); cx.lineTo(48, 18); cx.lineTo(46, 28); cx.lineTo(34, 30); cx.closePath(); cx.fill();
      // pontinhas braços
      cx.beginPath(); cx.moveTo(-8, 18); cx.lineTo(-14, 12); cx.lineTo(-10, 22); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(48, 18); cx.lineTo(54, 12); cx.lineTo(50, 22); cx.closePath(); cx.fill();

      // ── CORPO OVAL ──────────────────────────────────────────────────────
      cx.fillStyle = '#B02870';
      cx.beginPath(); cx.ellipse(20, 32, 17, 20, 0, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#E040A0';
      cx.beginPath(); cx.ellipse(20, 30, 16, 19, 0, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#F06AB8';
      cx.beginPath(); cx.ellipse(16, 24, 9, 12, 0, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#FFB0DC';
      cx.beginPath(); cx.ellipse(14, 22, 5, 7, 0, 0, Math.PI * 2); cx.fill();

      // ── CABEÇA ──────────────────────────────────────────────────────────
      cx.fillStyle = '#D03890';
      cx.beginPath(); cx.arc(20, 12, 11, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#F060B0';
      cx.beginPath(); cx.arc(18, 10, 8, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#FFB0DC';
      cx.beginPath(); cx.arc(15, 9, 4, 0, Math.PI * 2); cx.fill();

      // ── OLHOS ───────────────────────────────────────────────────────────
      cx.fillStyle = '#1A0010';
      cx.beginPath(); cx.arc(14, 13, 3.5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(26, 13, 3.5, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#FFFFFF';
      cx.beginPath(); cx.arc(15, 12, 1.5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(27, 12, 1.5, 0, Math.PI * 2); cx.fill();

      // ── BICO DOURADO ────────────────────────────────────────────────────
      cx.fillStyle = '#C8900A';
      cx.beginPath(); cx.moveTo(14, 16); cx.lineTo(26, 16); cx.lineTo(20, 26); cx.closePath(); cx.fill();
      cx.fillStyle = '#FFD030';
      cx.beginPath(); cx.moveTo(15, 16); cx.lineTo(25, 16); cx.lineTo(20, 19); cx.closePath(); cx.fill();

      // ── ESTRELA DOURADA NO TOPO ─────────────────────────────────────────
      cx.fillStyle = '#C88000';
      st(20, 0, 9);
      cx.fillStyle = '#FFD700';
      st(20, 0, 8);
      cx.fillStyle = '#FFEE66';
      st(20, 0, 5);
      cx.fillStyle = '#FFF8AA';
      cx.beginPath(); cx.arc(20, 0, 2.5, 0, Math.PI * 2); cx.fill();

      // ── ESTRELAS LARANJAS NO CORPO ──────────────────────────────────────
      cx.fillStyle = '#FF7700';
      [[7, 20], [33, 20], [6, 36], [34, 36], [20, 44]].forEach(([ox, oy]) => st(ox, oy, 4));
      cx.fillStyle = '#FFAA00';
      [[7, 20], [33, 20], [6, 36], [34, 36], [20, 44]].forEach(([ox, oy]) => st(ox, oy, 2.5));

      // ── PERNAS FINAS ────────────────────────────────────────────────────
      cx.strokeStyle = '#A02868'; cx.lineWidth = 3; cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(14, 48); cx.lineTo(11, 62); cx.stroke();
      cx.beginPath(); cx.moveTo(26, 48); cx.lineTo(29, 62); cx.stroke();
      cx.lineWidth = 1;

      // ── CORAÇÕES NOS PÉS ────────────────────────────────────────────────
      cx.fillStyle = '#881133';
      ht(11, 60, 4);
      ht(29, 60, 4);

      cx.restore(); // escala

      // ── TIMER BAR ───────────────────────────────────────────────────────
      cx.fillStyle = '#333';
      cx.fillRect(x - 2, yy + 55, 44, 4);
      cx.fillStyle = '#FF60A8';
      cx.fillRect(x - 2, yy + 55, 44 * (player.tuskTimer / 1200), 4);

      cx.restore();

    function drawBossEntity(b) {
      const sx = b.x - camX;
      // Body (bigger)
      cx.fillStyle = b.color;
      cx.fillRect(sx, b.y, b.w, b.h);
      // Cape
      cx.fillStyle = 'rgba(0,0,0,0.35)';
      cx.fillRect(sx - 5, b.y + 10, b.w + 10, b.h - 10);
      // Head
      cx.fillStyle = '#FDBCB4';
      cx.fillRect(sx + b.w * 0.18, b.y, b.w * 0.64, b.h * 0.28);
      // Hat
      cx.fillStyle = '#1A0800';
      cx.fillRect(sx, b.y - 10, b.w, 6);
      cx.fillRect(sx + b.w * 0.15, b.y - 24, b.w * 0.7, 16);
      cx.fillStyle = '#8B3513';
      cx.fillRect(sx + b.w * 0.15, b.y - 12, b.w * 0.7, 4);
      // Eye glow
      cx.fillStyle = '#FF4400';
      const bex = b.facing > 0 ? sx + b.w * 0.6 : sx + b.w * 0.2;
      cx.beginPath(); cx.arc(bex + 2, b.y + 7, 4, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#FFD700';
      cx.beginPath(); cx.arc(bex + 2, b.y + 7, 2, 0, Math.PI * 2); cx.fill();
      // Phase 2 aura
      if (b.phase === 2) {
        cx.strokeStyle = 'rgba(255,50,0,0.4)';
        cx.lineWidth = 4;
        cx.beginPath(); cx.arc(sx + b.w / 2, b.y + b.h / 2, b.w * 0.9 + Math.sin(frame * 0.15) * 6, 0, Math.PI * 2); cx.stroke();
        cx.lineWidth = 1;
      }
      // HP bar
      const bw = b.w + 14, bx2 = sx - 7, by2 = b.y - 15;
      cx.fillStyle = '#222'; cx.fillRect(bx2, by2, bw, 7);
      cx.fillStyle = b.hp > b.maxHp * 0.5 ? '#00FF44' : '#FF3300';
      cx.fillRect(bx2, by2, bw * (b.hp / b.maxHp), 7);
      cx.strokeStyle = '#FFD700'; cx.strokeRect(bx2, by2, bw, 7);
    }

    function drawProjs() {
      pProjs.forEach(pp => {
        const sx = pp.x - camX;
        cx.save(); cx.translate(sx + pp.w / 2, pp.y + pp.h / 2);
        if (pp.rot) cx.rotate(pp.rot);
        if (pp.type === 'nail') {
          const col = pp.act >= 4 ? '#FF00FF' : pp.act >= 3 ? '#00CFFF' : pp.act >= 2 ? '#1E8FFF' : '#2299FF';
          cx.fillStyle = col;
          cx.fillRect(-pp.w / 2, -pp.h / 2, pp.w, pp.h);
          if (pp.act >= 2) {
            cx.fillStyle = `rgba(0,150,255,0.25)`;
            cx.beginPath(); cx.arc(0, 0, pp.w * 0.9, 0, Math.PI * 2); cx.fill();
          }
        } else if (pp.type === 'bullet') {
          const col  = pp.dino ? '#2AB8B4' : '#E8C020';
          const col2 = pp.dino ? '#3CCCC8' : '#FFF0A0';
          cx.fillStyle = col;
          cx.beginPath(); cx.roundRect(-pp.w / 2, -pp.h / 2, pp.w, pp.h, 3); cx.fill();
          cx.fillStyle = col2;
          cx.beginPath(); cx.roundRect(-pp.w / 2 + 2, -pp.h / 2 + 1, pp.w / 2, pp.h / 2, 2); cx.fill();
          if (pp.dino) {
            cx.fillStyle = 'rgba(42,184,180,0.35)';
            cx.beginPath(); cx.arc(0, 0, pp.w * 0.8, 0, Math.PI * 2); cx.fill();
          }
        } else {
          cx.fillStyle = '#00CC44';
          cx.beginPath(); cx.arc(0, 0, pp.w / 2, 0, Math.PI * 2); cx.fill();
          cx.fillStyle = '#AAFFCC';
          cx.beginPath(); cx.arc(-3, -3, 2.5, 0, Math.PI * 2); cx.fill();
          cx.strokeStyle = '#00FF66'; cx.lineWidth = 1.5;
          cx.beginPath(); cx.arc(0, 0, pp.w / 2, 0, Math.PI * 2); cx.stroke();
          cx.lineWidth = 1;
        }
        cx.restore();
      });

      eProjs.forEach(pp => {
        const sx = pp.x - camX;
        cx.fillStyle = '#FF6600';
        cx.beginPath(); cx.arc(sx + pp.w / 2, pp.y + pp.h / 2, 5, 0, Math.PI * 2); cx.fill();
      });
      bProjs.forEach(pp => {
        const sx = pp.x - camX;
        cx.fillStyle = '#FF2200';
        cx.beginPath(); cx.arc(sx + pp.w / 2, pp.y + pp.h / 2, 6, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = 'rgba(255,0,0,0.3)';
        cx.beginPath(); cx.arc(sx + pp.w / 2, pp.y + pp.h / 2, 9, 0, Math.PI * 2); cx.fill();
      });
    }

    function drawParticles() {
      particles.forEach(p => {

        cx.fillStyle = p.col + toHex(a * 220);
        cx.beginPath(); cx.arc(sx, p.y, p.sz * a, 0, Math.PI * 2); cx.fill();
